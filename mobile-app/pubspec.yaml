name: nahj_delivery_driver
description: تطبيق المندوب - نهج للتوصيل
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # تتبع الموقع الحقيقي
  geolocator: 12.0.0
  permission_handler: 11.3.1

  # العمل في الخلفية حتى مع إغلاق التطبيق
  flutter_background_service: 5.0.10

  # كشف حالة الإنترنت وإعادة الاتصال التلقائي
  connectivity_plus: 6.0.5

  # نسبة البطارية وحالة الشحن
  battery_plus: 6.0.3

  # طلبات HTTP للتواصل مع الخادم
  http: 1.2.2

  # تخزين محلي للتوكن وبيانات الجلسة
  shared_preferences: 2.3.2

  # الترجمة (عربي/إنجليزي/بنغالي) - نظام مبسّط بدون أدوات بناء معقدة
  flutter_localizations:
    sdk: flutter

  # إشعارات محلية (تنبيه المندوب نفسه عند مشاكل الاتصال/GPS)
  flutter_local_notifications: 17.2.3

  cupertino_icons: 1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
