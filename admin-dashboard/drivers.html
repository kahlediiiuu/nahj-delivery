<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المناديب - نهج للتوصيل</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .page-wrap { padding: 20px; }
  .controls-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
  .controls-row select, .controls-row input { padding:8px; border:1px solid #cbd5e1; border-radius:6px; }
  .btn { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; color:#fff; }
  .btn-primary { background:#0f172a; }
  .btn-danger { background:#dc2626; }
  .btn-success { background:#16a34a; }
  .btn-warning { background:#eab308; color:#1f2937; }
  table { width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; }
  th, td { padding:10px 14px; text-align:right; font-size:14px; border-bottom:1px solid #f1f5f9; }
  th { background:#0f172a; color:#fff; }
  .badge { padding:3px 10px; border-radius:20px; font-size:12px; }
  .badge-active { background:#dcfce7; color:#166534; }
  .badge-suspended { background:#fee2e2; color:#991b1b; }
  .actions-cell { display:flex; gap:6px; flex-wrap:wrap; }
  .actions-cell button { padding:5px 10px; font-size:12px; }
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal.hidden { display: none; }
  .modal-content { background: #fff; padding: 24px; border-radius: 12px; width: 360px; }
  .modal-content label { display:block; font-size:13px; margin:10px 0 4px; color:#334155; }
  .modal-content input { width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; }
  .modal-actions { display:flex; gap:8px; margin-top:20px; }
</style>
</head>
<body>
  <div class="topbar">
    <h2>👥 إدارة المناديب</h2>
    <div class="topbar-right">
      <a href="index.html" style="color:#fff;margin-left:16px;">← الخريطة المباشرة</a>
      <a href="reports.html" style="color:#fff;margin-left:16px;">📊 التقارير</a>
      <a href="messages.html" style="color:#fff;margin-left:16px;">💬 الرسائل</a>
      <a href="upload-performance.html" style="color:#fff;margin-left:16px;">📤 رفع تقرير هنقرستيشن</a>
      <button id="logoutBtn">خروج</button>
    </div>
  </div>

  <div class="page-wrap">
    <div class="controls-row">
      <input type="text" id="searchInput" placeholder="بحث بالاسم أو رقم الجوال أو رقم المندوب...">
      <select id="statusFilter">
        <option value="">كل الحالات</option>
        <option value="active">نشط فقط</option>
        <option value="suspended">موقوف فقط</option>
      </select>
      <button class="btn btn-primary" id="searchBtn">بحث</button>
      <button class="btn btn-success" id="addBtn" style="margin-right:auto;">+ إضافة مندوب جديد</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>الرقم التعريفي الدائم</th><th>الاسم</th><th>رقم المندوب (دخول)</th><th>رقم الجوال</th><th>رمز المطابقة</th><th>المدينة</th><th>الحالة</th><th>إجراءات</th>
        </tr>
      </thead>
      <tbody id="driversTableBody"></tbody>
    </table>
  </div>

  <div id="driverModal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">إضافة مندوب جديد</h3>
      <input type="hidden" id="editDriverId">
      <label>الاسم الكامل</label>
      <input type="text" id="inputName">
      <label>رقم الجوال</label>
      <input type="text" id="inputPhone">
      <label>رقم المندوب (يستخدمه للدخول)</label>
      <input type="text" id="inputCode">
      <label>رمز المطابقة (لمطابقة تلقائية عند رفع ملفات الأداء - اختياري)</label>
      <input type="text" id="inputMatchCode" placeholder="مثال: رقم موظف هنقرستيشن">
      <label>المدينة</label>
      <select id="inputCity">
        <option value="">— غير محدد —</option>
        <option value="الرياض">الرياض</option>
        <option value="جدة">جدة</option>
        <option value="الدمام">الدمام</option>
        <option value="مكة">مكة</option>
        <option value="المدينة">المدينة</option>
        <option value="ينبع">ينبع</option>
      </select>
      <label id="passwordLabel">كلمة المرور</label>
      <input type="password" id="inputPassword">
      <p id="modalError" style="color:#dc2626;font-size:13px;margin-top:8px;"></p>
      <div class="modal-actions">
        <button class="btn btn-primary" id="saveDriverBtn" style="flex:1;">حفظ</button>
        <button class="btn" style="background:#94a3b8;flex:1;" id="cancelModalBtn">إلغاء</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/drivers-manage.js"></script>
</body>
</html>
