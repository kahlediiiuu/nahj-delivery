<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - نهج للتوصيل</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar">
    <h2>🚚 نهج للتوصيل - المتابعة المباشرة</h2>
    <div class="topbar-right">
      <a href="change-password.html" style="color:#fff;margin-left:16px;">🔑 تغيير كلمة المرور</a>
      <a href="messages.html" style="color:#fff;margin-left:16px;">💬 الرسائل</a>
      <a href="upload-performance.html" style="color:#fff;margin-left:16px;">📤 رفع تقرير هنقرستيشن</a>
      <a href="drivers.html" style="color:#fff;margin-left:16px;">👥 إدارة المناديب</a>
      <a href="reports.html" style="color:#fff;margin-left:16px;">📊 التقارير والأداء</a>
      <span id="adminName"></span>
      <button id="logoutBtn">خروج</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-box"><span class="stat-num" id="statOnline">0</span><span>🟢 متصل</span></div>
    <div class="stat-box"><span class="stat-num" id="statOffline">0</span><span>🔴 غير متصل</span></div>
    <div class="stat-box"><span class="stat-num" id="statInside">0</span><span>🔵 داخل النطاق</span></div>
    <div class="stat-box"><span class="stat-num" id="statOutside">0</span><span>⚠️ خارج النطاق</span></div>
    <div class="stat-box"><span class="stat-num" id="statMoving">0</span><span>متحرك</span></div>
    <div class="stat-box"><span class="stat-num" id="statStopped">0</span><span>🟡 متوقف</span></div>
    <button id="openGlobalAlertBtn" style="margin-right:auto;padding:10px 18px;background:#0f172a;color:#fff;border:none;border-radius:8px;cursor:pointer;">📢 إرسال إشعار</button>
  </div>

  <div class="main-layout">
    <div id="map"></div>
    <div class="sidebar">
      <input type="text" id="searchDriver" placeholder="بحث باسم المندوب أو رقمه...">
      <div id="driverList"></div>
    </div>
  </div>

  <div id="driverModal" class="modal hidden">
    <div class="modal-content">
      <span class="close-btn" id="closeModal">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="globalAlertModal" class="modal hidden">
    <div class="modal-content">
      <span class="close-btn" id="closeGlobalAlertModal">&times;</span>
      <h3>📢 إرسال إشعار لأي مندوب</h3>
      <label style="display:block;margin-top:12px;">ابحث عن المندوب (بالاسم، الرقم، أو الجوال)</label>
      <input type="text" id="globalAlertSearch" placeholder="اكتب للبحث..." style="width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #cbd5e1;">
      <select id="globalAlertDriverSelect" size="6" style="width:100%;padding:8px;margin-bottom:12px;border-radius:6px;border:1px solid #cbd5e1;"></select>

      <label style="display:block;">اختر سبب التنبيه أو اكتب رسالة مخصصة</label>
      <select id="globalAlertReasonSelect" style="width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #cbd5e1;"></select>

      <label style="display:flex;align-items:center;gap:8px;margin:10px 0;">
        <input type="checkbox" id="globalAlertSilentCheckbox">
        <span>🔕 بدون صوت (إشعار نصي هادئ فقط)</span>
      </label>

      <div id="globalAlertCustomTextWrap" style="display:none;">
        <textarea id="globalAlertCustomText" rows="3" placeholder="اكتب نص الرسالة هنا..." style="width:100%;padding:8px;border-radius:6px;border:1px solid #cbd5e1;"></textarea>
      </div>

      <button id="globalAlertSendBtn" style="width:100%;margin-top:12px;padding:10px;background:#0f172a;color:#fff;border:none;border-radius:6px;cursor:pointer;">
        إرسال التنبيه الآن
      </button>
    </div>
  </div>

  <div id="alertsToast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
