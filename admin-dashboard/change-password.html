<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي وإعدادات النظام - نهج للتوصيل</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/style.css">
<style>
  .tabs { display:flex; gap:8px; padding:10px 20px; background:#fff; border-bottom:1px solid #e2e8f0; flex-wrap:wrap; }
  .tab-btn { padding:8px 16px; border:1px solid #cbd5e1; background:#f8fafc; border-radius:8px; cursor:pointer; font-size:14px; }
  .tab-btn.active { background:#0f172a; color:#fff; border-color:#0f172a; }
  .tab-panel { display:none; padding:20px; max-width:480px; }
  .tab-panel.active { display:block; }
  .card { background:#fff; padding:24px; border-radius:12px; }
  .card label { display:block; font-size:13px; margin:12px 0 4px; color:#334155; }
  .card input { width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px; box-sizing:border-box; }
  .card button { width:100%; margin-top:20px; padding:12px; background:#0f172a; color:#fff; border:none; border-radius:8px; cursor:pointer; }
  .msg { margin-top:12px; font-size:13px; text-align:center; }
  .msg.error { color:#dc2626; }
  .msg.success { color:#16a34a; }
  #workzoneMap { height:320px; border-radius:10px; margin:12px 0; max-width:600px; }
  .locate-btn { background:#16a34a !important; margin-top:0 !important; }
</style>
</head>
<body>
  <div class="topbar">
    <h2>⚙️ حسابي وإعدادات النظام</h2>
    <div class="topbar-right">
      <a href="index.html" style="color:#fff;">← الرجوع للوحة التحكم</a>
    </div>
  </div>

  <div class="tabs">
    <div class="tab-btn active" data-tab="password">🔑 كلمة المرور</div>
    <div class="tab-btn" data-tab="username">👤 اسم المستخدم</div>
    <div class="tab-btn" data-tab="newadmin">➕ إضافة مشرف</div>
    <div class="tab-btn" data-tab="workzone">📍 نطاق العمل</div>
    <div class="tab-btn" data-tab="contact">📞 التواصل مع المناديب</div>
  </div>

  <!-- تغيير كلمة المرور -->
  <div class="tab-panel active" id="tab-password">
    <div class="card">
      <label>كلمة المرور الحالية</label>
      <input type="password" id="currentPassword">
      <label>كلمة المرور الجديدة (6 أحرف على الأقل)</label>
      <input type="password" id="newPassword">
      <label>تأكيد كلمة المرور الجديدة</label>
      <input type="password" id="confirmPassword">
      <button id="submitPasswordBtn">حفظ التغيير</button>
      <p id="passwordMsg" class="msg"></p>
    </div>
  </div>

  <!-- تغيير اسم المستخدم -->
  <div class="tab-panel" id="tab-username">
    <div class="card">
      <label>كلمة المرور الحالية (للتأكيد)</label>
      <input type="password" id="usernameCurrentPassword">
      <label>اسم المستخدم الجديد</label>
      <input type="text" id="newUsername">
      <button id="submitUsernameBtn">حفظ التغيير</button>
      <p id="usernameMsg" class="msg"></p>
    </div>
  </div>

  <!-- إضافة مشرف جديد -->
  <div class="tab-panel" id="tab-newadmin">
    <div class="card">
      <label>اسم المشرف الجديد</label>
      <input type="text" id="newAdminName">
      <label>اسم المستخدم الخاص به</label>
      <input type="text" id="newAdminUsername">
      <label>كلمة المرور الخاصة به</label>
      <input type="password" id="newAdminPassword">
      <button id="submitNewAdminBtn">إنشاء الحساب</button>
      <p id="newAdminMsg" class="msg"></p>
    </div>
  </div>

  <!-- نطاق العمل -->
  <div class="tab-panel" id="tab-workzone">
    <div class="card" style="max-width:600px;">
      <p style="font-size:13px;color:#64748b;">
        هذا هو مركز نطاق عمل مناديبك. أي مندوب يخرج عن هذه الدائرة سيظهر تنبيه "خارج النطاق".
      </p>
      <button class="locate-btn" id="useMyLocationBtn">📍 استخدم موقعي الحالي كمركز النطاق</button>
      <div id="workzoneMap"></div>
      <label>نصف قطر النطاق (بالمتر)</label>
      <input type="number" id="radiusInput" value="15000">
      <button id="saveWorkzoneBtn">حفظ نطاق العمل</button>
      <p id="workzoneMsg" class="msg"></p>
    </div>
  </div>

  <!-- التواصل مع المناديب -->
  <div class="tab-panel" id="tab-contact">
    <div class="card" style="max-width:500px;">
      <p style="font-size:13px;color:#64748b;">
        هذا الرقم يظهر كزر "واتساب" و"اتصال" مباشر داخل تطبيق كل مندوب.
      </p>
      <label>رقم واتساب (بصيغة دولية بدون + أو صفر، مثال: 966501234567)</label>
      <input type="text" id="whatsappInput" placeholder="966501234567">
      <label>رقم الهاتف للاتصال المباشر</label>
      <input type="text" id="phoneInput" placeholder="+966501234567">
      <button id="saveContactBtn">حفظ بيانات التواصل</button>
      <p id="contactMsg" class="msg"></p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/config.js"></script>
  <script src="js/account.js"></script>
</body>
</html>
